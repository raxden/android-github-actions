name: 'Deploy to Play Store'
description: 'Deploy an Android build to Google Play'
inputs:
  id:
    description: 'Value used to identify the workflow run'
    required: false
    default: ${{ github.run_number }}

  build-type:
    description: "Build type"
    required: false
    default: "Debug"

  gradle-args:
    description: 'Extra Gradle arguments'
    required: false
    default: '--configuration-cache --stacktrace'

  artifact-type:
    description: "Artifact type"
    required: false
    default: "APK"

  signing-files:
    description: 'Base64 encoded string of the file'
    required: false
    default: ""

  service-credentials:
    description: 'Google Application Credentials'
    required: true

runs:
  using: "composite"
  steps:
    - name: Recover artifacts needed to deploy
      uses: actions/download-artifact@v4
      with:
        name: build-${{ inputs.artifact-type }}-${{ inputs.build-type }}-${{ inputs.id }}
        path: app/build/outputs/

    - name: Decode secret files
      if: ${{ inputs.build-type == 'Release' && inputs.signing-files != '' }}
      id: decode_secret_files
      uses: timheuer/base64-to-file@v1.2
      with:
        fileName: 'signing.tar.gz'
        fileDir: './config'
        encodedString: ${{ inputs.signing-files }}

    - name: Extract secret files
      if: ${{ inputs.build-type == 'Release' && inputs.signing-files != '' }}
      shell: bash
      run: |
        tar xf ${{ steps.decode_secret_files.outputs.filePath }} --directory ./config

    - name: Decode service credentials
      uses: timheuer/base64-to-file@v1.2
      with:
        fileName: "service_play_credentials.json"
        fileDir: "./config"
        encodedString: ${{ inputs.service-credentials }}

    - name: Deploy in Google Play Console
      run: |
        ./gradlew publishBundle ${{ inputs.gradle-args }}
      shell: bash
